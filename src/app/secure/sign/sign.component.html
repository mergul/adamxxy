<div class="form">
    <ul class="tab-group">
      <li class="tab" [class.active]="!(viewMode|push)" rel="signup"
      (click)="onClick(false)">Sign Up</li>
      <li class="tab" [class.active]="viewMode|push" rel="signin"
      (click)="onClick(true)">Sign In</li>
    </ul>
    <article class="tab-content" [ngSwitch]="viewMode|push">
        <section id="signup" class="" [class.active]="!(viewMode|push)" *ngSwitchCase="false">
        <h1>Sign Up for Free</h1>
        <form (ngSubmit)="onSubmit(registerForm.value)" [formGroup]="registerForm">
          <div class="top-row">
            <div class="field-wrap">
              <input id="name" type="text" placeholder=" " required autocomplete="off" />
              <label for="name">
                First Name<span class="req">*</span>
              </label>
            </div>
            <div class="field-wrap">
              <input id="lastname" type="text" placeholder=" " required autocomplete="off" />
              <label for="lastname">
                Last Name<span class="req">*</span>
              </label>
            </div>
          </div> 
          <div class="field-wrap">
            <input id="email" type="email" placeholder=" " required autocomplete="off" />
            <label for="email">
              Email Address<span class="req">*</span>
            </label>
          </div> 
          <div class="field-wrap">
            <input formControlName="password" id="password" type="password" placeholder="Set Password" required autocomplete="off" />
            <label for="password">
              Set Password<span class="req">*</span>
            </label>
          </div>
          <div class="field-wrap">
            <input formControlName="password2" id="password2" type="password" placeholder=" Confirm Password" required autocomplete="off" />
            <label for="password2">
              Confirm Password<span class="req">*</span>
            </label>
          </div>
          <div class='error' *ngIf="mismatchPasswordsError|push">
            <div class="alert-danger errormessageadduser" *ngIf="mismatchPasswordsError|push">Passwords do not
              match</div>
          </div>
          <button type="submit" class="button button-block">Get Started</button>
        </form>
    </section>
    <section id="signin" class="signin" [class.active]="viewMode|push" *ngSwitchCase="true">
        <h1>Welcome Back!</h1>
        <form (ngSubmit)="onSubmit(loginForm.value)" [formGroup]="loginForm">
          <div class="field-wrap">
            <input formControlName="email" id="email" type="email" placeholder=" " required autocomplete="off" />
            <label for="email">
              Email Address<span class="req">*</span>
            </label>
          </div>
          <div class="field-wrap">
            <input formControlName="password" id="password" type="password" placeholder=" " required autocomplete="off" />
            <label for="password">
              Password<span class="req">*</span>
            </label>
          </div>
          <label class="error">{{errorMessage}}</label>
          <button *ngIf="!resetPassword && (isValidMailFormat|push)&&errorMessage.length>0"
            class="btn btn-danger" (click)="sendResetEmail()">Reset Password</button>
          <p *ngIf="resetPassword" class="text-success">Check your email to reset password!</p>                        
          <p class="forgot">Forgot Password?</p>
          <button class="button button-block">Sign In</button>
        </form>
        <button id="kaydet" type="button" class="butto ripple button-outline" (click)="triedGoogleLogin()">Signin with Google</button>
    </section>
    </article><!-- tab-content -->
  </div> <!-- /form -->

<main id="user-profile">
  <section class="top">
    <figure class="figure">
      <img class="image-bg" src="assets/back-img.jpeg" width="1351px" height="225px" alt="asel" />
      <img class="image-profile" src="assets/profile-img.jpeg" width="192px" height="192px" alt="masel" />
    </figure>
  </section>
  <section class="paths">
    <ol>
      <li *ngFor="let item of newsService._masterBreadcrumbList;let i=index;">
        <a [routerLink]="[i==0?'../../'+item:(i==1?'../'+item:'./'+item)]"> --> {{item}}</a>
      </li>
    </ol>
  </section>
  <section class="side" (click)="viewMode =false">
    <article class="resume">
      <h1>Özgeçmiş</h1>
      <p>Burada dünyaya geldi. Bu dünyada yetişti.</p>
    </article>
    <button routerLink="contents" [class.active]="viewMode">içerikler</button>
    <button routerLink="followee">izlenen kişiler</button>
    <button routerLink="followco">izlenen konular</button>
    <button routerLink="followers">takipçiler</button>
    <button routerLink="user-edit">güncelle</button>
  </section>
  <section class="center">
    <router-outlet></router-outlet>
  </section>
</main>
